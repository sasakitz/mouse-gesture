<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000020"/>
    </filter>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <clipPath id="browserClip">
      <rect width="1280" height="800" rx="0"/>
    </clipPath>
  </defs>

  <!-- ═══ BROWSER WINDOW ═══ -->

  <!-- Window chrome background -->
  <rect width="1280" height="800" fill="#e8eaed"/>

  <!-- Tab bar -->
  <rect x="0" y="0" width="1280" height="38" fill="#dee1e6"/>

  <!-- Active tab -->
  <path d="M0,38 L0,14 Q0,8 6,8 L220,8 Q228,8 232,14 L236,38 Z" fill="white"/>
  <!-- Favicon in tab -->
  <rect x="14" y="16" width="14" height="14" rx="3" fill="#312e81"/>
  <path d="M19,19 L19,26 L25,26" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="19" cy="19" r="2" fill="rgba(255,255,255,0.7)"/>
  <!-- Tab title -->
  <text x="34" y="28" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#3c4043">技術ブログ — Chrome拡張機能の使い方</text>
  <!-- Tab close -->
  <text x="220" y="26" font-family="sans-serif" font-size="11" fill="#9aa0a6">✕</text>

  <!-- Inactive tabs -->
  <rect x="240" y="10" width="160" height="28" rx="4" fill="#c8cacd"/>
  <text x="256" y="28" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#5f6368">GitHub</text>
  <rect x="408" y="10" width="160" height="28" rx="4" fill="#c8cacd"/>
  <text x="424" y="28" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#5f6368">Stack Overflow</text>

  <!-- New tab button -->
  <text x="575" y="27" font-family="sans-serif" font-size="18" fill="#5f6368">+</text>

  <!-- Toolbar -->
  <rect x="0" y="38" width="1280" height="50" fill="white"/>
  <line x1="0" y1="88" x2="1280" y2="88" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Back / Forward / Reload buttons -->
  <text x="18" y="68" font-family="sans-serif" font-size="20" fill="#3c4043">←</text>
  <text x="46" y="68" font-family="sans-serif" font-size="20" fill="#bdbdbd">→</text>
  <text x="74" y="68" font-family="sans-serif" font-size="20" fill="#3c4043">↻</text>

  <!-- Address bar -->
  <rect x="108" y="48" width="960" height="30" rx="15" fill="#f1f3f4"/>
  <text x="136" y="67" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#5f6368">🔒</text>
  <text x="156" y="67" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#3c4043">techblog.example.com/articles/browser-extensions</text>

  <!-- Toolbar icons -->
  <circle cx="1110" cy="63" r="13" fill="#f1f3f4"/>
  <text x="1103" y="68" font-family="sans-serif" font-size="14">⭐</text>
  <circle cx="1140" cy="63" r="13" fill="#f1f3f4"/>
  <text x="1133" y="68" font-family="sans-serif" font-size="14">⋮</text>

  <!-- Extension icon in toolbar -->
  <rect x="1165" y="50" width="28" height="28" rx="6" fill="#312e81"/>
  <path d="M1172,55 L1172,68 L1183,68" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="1172" cy="55" r="2.5" fill="rgba(255,255,255,0.7)"/>
  <!-- Arrow head -->
  <path d="M1178,63 L1183,68 L1178,73" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ═══ WEBPAGE CONTENT ═══ -->
  <rect x="0" y="88" width="1280" height="712" fill="white"/>

  <!-- Site navigation -->
  <rect x="0" y="88" width="1280" height="56" fill="url(#heroGrad)"/>
  <text x="40" y="123" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="white">TechBlog</text>
  <text x="180" y="120" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="rgba(255,255,255,0.85)">ホーム</text>
  <text x="240" y="120" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="rgba(255,255,255,0.85)">記事一覧</text>
  <text x="320" y="120" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="rgba(255,255,255,0.85)">チュートリアル</text>
  <text x="430" y="120" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="rgba(255,255,255,0.85)">ツール</text>

  <!-- Article layout -->
  <!-- Breadcrumb -->
  <text x="240" y="175" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#9aa0a6">ホーム  ›  記事一覧  ›  Chrome拡張機能</text>

  <!-- Article title -->
  <text x="240" y="220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="30" font-weight="700" fill="#1a1a2e">Chrome拡張機能でブラウジングを効率化する方法</text>
  <text x="240" y="248" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#9aa0a6">2026年3月15日  ·  読了時間: 8分  ·  Chrome, 拡張機能</text>

  <!-- Divider -->
  <line x1="240" y1="264" x2="960" y2="264" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Article text (simulated lines) -->
  <rect x="240" y="280" width="680" height="14" rx="3" fill="#e5e7eb"/>
  <rect x="240" y="304" width="640" height="14" rx="3" fill="#e5e7eb"/>
  <rect x="240" y="328" width="700" height="14" rx="3" fill="#e5e7eb"/>
  <rect x="240" y="352" width="580" height="14" rx="3" fill="#e5e7eb"/>

  <!-- Subheading -->
  <rect x="240" y="386" width="260" height="18" rx="3" fill="#d1d5db"/>

  <!-- More text lines -->
  <rect x="240" y="418" width="700" height="14" rx="3" fill="#e5e7eb"/>
  <rect x="240" y="442" width="660" height="14" rx="3" fill="#e5e7eb"/>
  <rect x="240" y="466" width="680" height="14" rx="3" fill="#e5e7eb"/>
  <rect x="240" y="490" width="520" height="14" rx="3" fill="#e5e7eb"/>

  <!-- Code block -->
  <rect x="240" y="520" width="700" height="90" rx="8" fill="#1e1e2e"/>
  <text x="264" y="545" font-family="'Courier New',monospace" font-size="13" fill="#89b4fa">document</text>
  <text x="340" y="545" font-family="'Courier New',monospace" font-size="13" fill="#cdd6f4">.addEventListener(</text>
  <text x="508" y="545" font-family="'Courier New',monospace" font-size="13" fill="#a6e3a1">'mousedown'</text>
  <text x="600" y="545" font-family="'Courier New',monospace" font-size="13" fill="#cdd6f4">, handler);</text>
  <text x="264" y="570" font-family="'Courier New',monospace" font-size="13" fill="#89b4fa">document</text>
  <text x="340" y="570" font-family="'Courier New',monospace" font-size="13" fill="#cdd6f4">.addEventListener(</text>
  <text x="508" y="570" font-family="'Courier New',monospace" font-size="13" fill="#a6e3a1">'mousemove'</text>
  <text x="600" y="570" font-family="'Courier New',monospace" font-size="13" fill="#cdd6f4">, handler);</text>

  <!-- Sidebar (table of contents) -->
  <rect x="1000" y="175" width="240" height="300" rx="8" fill="#f8f9fa" filter="url(#shadow)"/>
  <text x="1020" y="205" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#1a1a2e">目次</text>
  <line x1="1020" y1="215" x2="1220" y2="215" stroke="#e5e7eb" stroke-width="1"/>
  <text x="1020" y="238" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#3b82f6">1. はじめに</text>
  <text x="1020" y="260" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#6b7280">2. 基本設定</text>
  <text x="1020" y="282" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#6b7280">3. コンテントスクリプト</text>
  <text x="1020" y="304" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#6b7280">4. イベント処理</text>
  <text x="1020" y="326" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#6b7280">5. Chrome APIの活用</text>
  <text x="1020" y="348" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#6b7280">6. まとめ</text>

  <!-- ═══ GESTURE TRAIL OVERLAY ═══ -->

  <!-- Trail: flowing left from right side of page -->
  <!-- The gesture goes roughly right-to-left, indicating "戻る" (back) -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Main trail path -->
    <polyline
      points="820,430 790,426 755,418 718,408 680,398 642,390 605,384 568,380 530,378 492,378 454,381 416,387 378,395 340,403 305,410 272,415"
      stroke="#3b82f6"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.9"
    />
    <!-- Start dot -->
    <circle cx="820" cy="430" r="6" fill="#3b82f6" opacity="0.85"/>
  </g>

  <!-- Label box near current cursor position (left end of trail) -->
  <g transform="translate(175, 395)">
    <!-- Shadow -->
    <rect x="0" y="0" width="112" height="52" rx="8" fill="rgba(0,0,0,0.75)"/>
    <!-- Arrow sequence -->
    <text x="12" y="23" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#3b82f6">←</text>
    <!-- Action label -->
    <text x="12" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">戻る</text>
  </g>

  <!-- Cursor dot at end of trail -->
  <circle cx="272" cy="415" r="4" fill="white" stroke="#3b82f6" stroke-width="2" opacity="0.8"/>

  <!-- ═══ CAPTION BANNER ═══ -->
  <rect x="0" y="730" width="1280" height="70" fill="rgba(49,46,129,0.92)"/>
  <text x="640" y="762" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">右クリックを押しながら左にドラッグ → 「戻る」が実行される</text>
  <text x="640" y="786" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="rgba(255,255,255,0.75)" text-anchor="middle">ドラッグ中は軌跡とアクション名がリアルタイムで表示されます</text>
</svg>
