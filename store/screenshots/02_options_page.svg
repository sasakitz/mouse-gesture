<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- ═══ PAGE BACKGROUND ═══ -->
  <rect width="1280" height="800" fill="#1e1e2e"/>

  <!-- ═══ BROWSER CHROME (minimal) ═══ -->
  <rect x="0" y="0" width="1280" height="38" fill="#181825"/>
  <!-- Tab -->
  <rect x="0" y="10" width="260" height="28" rx="4 4 0 0" fill="#1e1e2e"/>
  <rect x="14" y="17" width="14" height="14" rx="3" fill="#312e81"/>
  <path d="M19,20 L19,27 L25,27" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="19" cy="20" r="1.8" fill="rgba(255,255,255,0.7)"/>
  <text x="34" y="29" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#cdd6f4">Mouse Gesture — 設定</text>

  <!-- Toolbar -->
  <rect x="0" y="38" width="1280" height="46" fill="#181825"/>
  <text x="18" y="66" font-family="sans-serif" font-size="18" fill="#6c7086">←</text>
  <text x="44" y="66" font-family="sans-serif" font-size="18" fill="#6c7086">→</text>
  <rect x="78" y="48" width="900" height="26" rx="13" fill="#313244"/>
  <text x="130" y="65" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#6c7086">chrome-extension://...</text>
  <text x="106" y="65" font-family="sans-serif" font-size="11" fill="#6c7086">🔒</text>

  <!-- ═══ OPTIONS PAGE CONTENT ═══ -->
  <!-- Starts at y=84 -->

  <!-- Page header -->
  <rect x="0" y="84" width="1280" height="64" fill="#181825"/>
  <rect x="0" y="84" width="5" height="64" fill="#3b82f6"/>
  <!-- Extension icon in header -->
  <rect x="24" y="96" width="40" height="40" rx="10" fill="#312e81"/>
  <path d="M32,103 L32,118 L46,118" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="32" cy="103" r="3" fill="rgba(255,255,255,0.7)"/>
  <path d="M41,112 L46,118 L41,124" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Header title -->
  <text x="76" y="109" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="white">Mouse Gesture</text>
  <text x="76" y="129" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#6c7086">設定 · v1.1.3</text>

  <!-- ═══ LAYOUT: SIDEBAR + MAIN ═══ -->

  <!-- Sidebar background -->
  <rect x="0" y="148" width="220" height="652" fill="#181825"/>

  <!-- Nav items -->
  <!-- Active: ジェスチャー -->
  <rect x="0" y="148" width="220" height="48" fill="#313244"/>
  <rect x="0" y="148" width="4" height="48" fill="#3b82f6"/>
  <text x="48" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="white">ジェスチャー</text>
  <!-- icon -->
  <text x="20" y="178" font-family="sans-serif" font-size="16" fill="#3b82f6">≡</text>

  <!-- 外観 -->
  <rect x="0" y="196" width="220" height="44" fill="transparent"/>
  <text x="48" y="223" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#6c7086">外観</text>
  <text x="20" y="223" font-family="sans-serif" font-size="15" fill="#6c7086">◑</text>

  <!-- カスタム -->
  <rect x="0" y="240" width="220" height="44" fill="transparent"/>
  <text x="48" y="267" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#6c7086">カスタムジェスチャー</text>
  <text x="20" y="267" font-family="sans-serif" font-size="14" fill="#6c7086">✏</text>

  <!-- ブラックリスト -->
  <rect x="0" y="284" width="220" height="44" fill="transparent"/>
  <text x="48" y="311" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#6c7086">ブラックリスト</text>
  <text x="20" y="311" font-family="sans-serif" font-size="14" fill="#6c7086">🚫</text>

  <!-- 修飾キーモード -->
  <rect x="0" y="328" width="220" height="44" fill="transparent"/>
  <text x="48" y="355" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#6c7086">修飾キーモード</text>
  <text x="20" y="355" font-family="sans-serif" font-size="14" fill="#6c7086">⌨</text>

  <!-- Sidebar divider -->
  <line x1="0" y1="388" x2="220" y2="388" stroke="#313244" stroke-width="1"/>

  <!-- Enable toggle in sidebar -->
  <text x="20" y="418" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#a6adc8">有効</text>
  <!-- Toggle switch ON -->
  <rect x="160" y="404" width="44" height="24" rx="12" fill="#3b82f6"/>
  <circle cx="192" cy="416" r="10" fill="white" filter="url(#shadow2)"/>

  <!-- ═══ MAIN CONTENT: GESTURE LIST ═══ -->
  <rect x="220" y="148" width="1060" height="652" fill="#1e1e2e"/>

  <!-- Section title -->
  <text x="260" y="184" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#cdd6f4">ジェスチャー設定</text>
  <text x="260" y="204" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#6c7086">ジェスチャーとアクションのマッピングを管理します</text>

  <!-- Column headers -->
  <rect x="240" y="220" width="1020" height="34" rx="6" fill="#181825"/>
  <text x="270" y="242" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#6c7086">ジェスチャー</text>
  <text x="420" y="242" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#6c7086">シーケンス</text>
  <text x="580" y="242" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#6c7086">アクション</text>

  <!-- ── Gesture rows ── -->

  <!-- Row 1: L → 戻る -->
  <rect x="240" y="262" width="1020" height="52" rx="6" fill="#313244"/>
  <!-- Arrow diagram canvas area -->
  <rect x="258" y="270" width="90" height="36" rx="4" fill="#1e1e2e"/>
  <text x="298" y="294" font-family="sans-serif" font-size="20" fill="#89b4fa" text-anchor="middle">←</text>
  <!-- Sequence label -->
  <text x="428" y="292" font-family="'Courier New',monospace" font-size="14" fill="#a6e3a1">L</text>
  <!-- Action select (simulated) -->
  <rect x="570" y="271" width="200" height="32" rx="6" fill="#1e1e2e"/>
  <text x="586" y="291" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#cdd6f4">戻る</text>
  <text x="752" y="291" font-family="sans-serif" font-size="10" fill="#6c7086">▼</text>
  <!-- Delete btn -->
  <rect x="1220" y="274" width="28" height="28" rx="6" fill="#1e1e2e"/>
  <text x="1229" y="293" font-family="sans-serif" font-size="14" fill="#f38ba8">🗑</text>

  <!-- Row 2: R → 進む -->
  <rect x="240" y="322" width="1020" height="52" rx="6" fill="#2a2a3e"/>
  <rect x="258" y="330" width="90" height="36" rx="4" fill="#1e1e2e"/>
  <text x="298" y="354" font-family="sans-serif" font-size="20" fill="#89b4fa" text-anchor="middle">→</text>
  <text x="428" y="352" font-family="'Courier New',monospace" font-size="14" fill="#a6e3a1">R</text>
  <rect x="570" y="331" width="200" height="32" rx="6" fill="#1e1e2e"/>
  <text x="586" y="351" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#cdd6f4">進む</text>
  <text x="752" y="351" font-family="sans-serif" font-size="10" fill="#6c7086">▼</text>
  <rect x="1220" y="334" width="28" height="28" rx="6" fill="#1e1e2e"/>
  <text x="1229" y="353" font-family="sans-serif" font-size="14" fill="#f38ba8">🗑</text>

  <!-- Row 3: U → 最上部へスクロール -->
  <rect x="240" y="382" width="1020" height="52" rx="6" fill="#313244"/>
  <rect x="258" y="390" width="90" height="36" rx="4" fill="#1e1e2e"/>
  <text x="298" y="414" font-family="sans-serif" font-size="20" fill="#89b4fa" text-anchor="middle">↑</text>
  <text x="428" y="412" font-family="'Courier New',monospace" font-size="14" fill="#a6e3a1">U</text>
  <rect x="570" y="391" width="200" height="32" rx="6" fill="#1e1e2e"/>
  <text x="586" y="411" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#cdd6f4">最上部へスクロール</text>
  <text x="752" y="411" font-family="sans-serif" font-size="10" fill="#6c7086">▼</text>
  <rect x="1220" y="394" width="28" height="28" rx="6" fill="#1e1e2e"/>
  <text x="1229" y="413" font-family="sans-serif" font-size="14" fill="#f38ba8">🗑</text>

  <!-- Row 4: D → 最下部へスクロール -->
  <rect x="240" y="442" width="1020" height="52" rx="6" fill="#2a2a3e"/>
  <rect x="258" y="450" width="90" height="36" rx="4" fill="#1e1e2e"/>
  <text x="298" y="474" font-family="sans-serif" font-size="20" fill="#89b4fa" text-anchor="middle">↓</text>
  <text x="428" y="472" font-family="'Courier New',monospace" font-size="14" fill="#a6e3a1">D</text>
  <rect x="570" y="451" width="200" height="32" rx="6" fill="#1e1e2e"/>
  <text x="586" y="471" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#cdd6f4">最下部へスクロール</text>
  <text x="752" y="471" font-family="sans-serif" font-size="10" fill="#6c7086">▼</text>
  <rect x="1220" y="454" width="28" height="28" rx="6" fill="#1e1e2e"/>
  <text x="1229" y="473" font-family="sans-serif" font-size="14" fill="#f38ba8">🗑</text>

  <!-- Row 5: DR → タブを閉じる -->
  <rect x="240" y="502" width="1020" height="52" rx="6" fill="#313244"/>
  <rect x="258" y="510" width="90" height="36" rx="4" fill="#1e1e2e"/>
  <text x="281" y="534" font-family="sans-serif" font-size="17" fill="#89b4fa">↓</text>
  <text x="306" y="534" font-family="sans-serif" font-size="17" fill="#89b4fa">→</text>
  <text x="428" y="532" font-family="'Courier New',monospace" font-size="14" fill="#a6e3a1">DR</text>
  <rect x="570" y="511" width="200" height="32" rx="6" fill="#1e1e2e"/>
  <text x="586" y="531" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#cdd6f4">タブを閉じる</text>
  <text x="752" y="531" font-family="sans-serif" font-size="10" fill="#6c7086">▼</text>
  <rect x="1220" y="514" width="28" height="28" rx="6" fill="#1e1e2e"/>
  <text x="1229" y="533" font-family="sans-serif" font-size="14" fill="#f38ba8">🗑</text>

  <!-- Row 6: DU → リロード -->
  <rect x="240" y="562" width="1020" height="52" rx="6" fill="#2a2a3e"/>
  <rect x="258" y="570" width="90" height="36" rx="4" fill="#1e1e2e"/>
  <text x="281" y="594" font-family="sans-serif" font-size="17" fill="#89b4fa">↓</text>
  <text x="306" y="594" font-family="sans-serif" font-size="17" fill="#89b4fa">↑</text>
  <text x="428" y="592" font-family="'Courier New',monospace" font-size="14" fill="#a6e3a1">DU</text>
  <rect x="570" y="571" width="200" height="32" rx="6" fill="#1e1e2e"/>
  <text x="586" y="591" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#cdd6f4">リロード</text>
  <text x="752" y="591" font-family="sans-serif" font-size="10" fill="#6c7086">▼</text>
  <rect x="1220" y="574" width="28" height="28" rx="6" fill="#1e1e2e"/>
  <text x="1229" y="593" font-family="sans-serif" font-size="14" fill="#f38ba8">🗑</text>

  <!-- Add gesture button -->
  <rect x="240" y="632" width="220" height="36" rx="8" fill="#3b82f6"/>
  <text x="350" y="655" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">+ ジェスチャーを追加</text>

  <!-- ═══ CAPTION BANNER ═══ -->
  <rect x="0" y="730" width="1280" height="70" fill="rgba(49,46,129,0.92)"/>
  <text x="640" y="762" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">ジェスチャーとアクションを自由にカスタマイズ</text>
  <text x="640" y="786" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="rgba(255,255,255,0.75)" text-anchor="middle">追加・削除・変更が可能。アクションは戻る・進む・リロード・タブを閉じる・スクロールから選択</text>
</svg>
