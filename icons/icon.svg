<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background: dark indigo rounded square -->
  <rect width="128" height="128" rx="24" fill="#312e81"/>

  <!-- Gesture trail: L-shaped path (Down then Right) with arrowhead -->
  <!-- Vertical segment (Down) -->
  <line x1="44" y1="28" x2="44" y2="78"
        stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Horizontal segment (Right) -->
  <line x1="44" y1="78" x2="92" y2="78"
        stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Arrowhead at end -->
  <polyline points="78,64 92,78 78,92"
            stroke="white" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Start dot -->
  <circle cx="44" cy="28" r="6" fill="white" opacity="0.7"/>
</svg>
